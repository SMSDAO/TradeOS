name: Deploy Preview

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch/tag/SHA) to deploy'
        required: false
        default: 'main'
      rpc_url:
        description: 'Optional NEXT_PUBLIC_RPC_URL override'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    
    steps:
      - name: Check required secrets
        id: check
        run: |
          MISSING_SECRETS=""
          
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            MISSING_SECRETS="${MISSING_SECRETS}VERCEL_TOKEN, "
          fi
          
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            MISSING_SECRETS="${MISSING_SECRETS}VERCEL_PROJECT_ID, "
          fi
          
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            MISSING_SECRETS="${MISSING_SECRETS}VERCEL_ORG_ID, "
          fi
          
          if [ -n "$MISSING_SECRETS" ]; then
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            echo "⚠️ Missing required secrets: $MISSING_SECRETS"
            echo "::warning::Missing required secrets: $MISSING_SECRETS"
          else
            echo "has-secrets=true" >> $GITHUB_OUTPUT
            echo "✅ All required secrets are configured"
          fi

  deploy-preview:
    name: Deploy to Vercel Preview
    runs-on: ubuntu-latest
    needs: validate-secrets
    if: needs.validate-secrets.outputs.has-secrets == 'true'
    timeout-minutes: 15
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
          
      - name: Install webapp dependencies
        working-directory: ./webapp
        run: npm ci

      - name: Validate RPC URL
        run: |
          RPC_URL="${{ github.event.inputs.rpc_url || secrets.NEXT_PUBLIC_RPC_URL }}"
          if [ -z "$RPC_URL" ]; then
            echo "::error::Either rpc_url input or NEXT_PUBLIC_RPC_URL secret must be provided for manual preview deployment."
            exit 1
          fi
        
      - name: Build webapp
        working-directory: ./webapp
        run: npm run build
        env:
          NEXT_PUBLIC_RPC_URL: ${{ github.event.inputs.rpc_url || secrets.NEXT_PUBLIC_RPC_URL }}
          
      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./webapp
          scope: ${{ secrets.VERCEL_ORG_ID }}
          
      - name: Add deployment summary
        run: |
          DEPLOY_SHA="$(git rev-parse HEAD)"
          echo "## 🚀 Manual Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`$DEPLOY_SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: \`${{ github.event.inputs.ref || github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.deploy.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY

  skip-preview:
    name: Skip Preview (Missing Secrets)
    runs-on: ubuntu-latest
    needs: validate-secrets
    if: needs.validate-secrets.outputs.has-secrets == 'false'
    
    steps:
      - name: Add skipped summary
        run: |
          echo "## ⚠️ Preview Deployment Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Required Vercel secrets are missing:" >> $GITHUB_STEP_SUMMARY
          echo "- VERCEL_TOKEN" >> $GITHUB_STEP_SUMMARY
          echo "- VERCEL_PROJECT_ID" >> $GITHUB_STEP_SUMMARY
          echo "- VERCEL_ORG_ID" >> $GITHUB_STEP_SUMMARY
