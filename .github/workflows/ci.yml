name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webapp/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm --prefix webapp ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run lint:webapp

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webapp/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm --prefix webapp ci --no-audit --no-fund
      - run: npm run type-check
      - run: npm run type-check:webapp

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webapp/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm --prefix webapp ci --no-audit --no-fund
      - run: npm test
      - run: npm --prefix webapp run test --if-present -- --ci --coverage

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webapp/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm --prefix webapp ci --no-audit --no-fund
      - run: npm run build
